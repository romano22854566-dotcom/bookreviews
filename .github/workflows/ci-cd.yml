name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==============================
  # Тесты Backend
  # ==============================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: book_reviews_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/book_reviews_db
          SPRING_DATASOURCE_USERNAME: postgres
          DB_PASSWORD: postgres
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: |
          mvn test -B -Dcheckstyle.skip

  # ==============================
  # Тесты Frontend
  # ==============================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build check
        working-directory: ./frontend
        env:
          CI: false
        run: npm run build

  # ==============================
  # Сборка Docker образов
  # ==============================
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bookreviews-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bookreviews-frontend:latest

  # ==============================
  # Healthcheck
  # ==============================
  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "POSTGRES_DB=book_reviews_db" >> .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/book_reviews_db" >> .env
          echo "SPRING_DATASOURCE_USERNAME=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "SPRING_JPA_HIBERNATE_DDL_AUTO=update" >> .env

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for services to start
        run: sleep 90

      - name: Check Backend Health
        run: |
          curl -f http://localhost:8080/api/actuator/health
          echo "Backend OK!"

      - name: Check Frontend Health
        run: |
          curl -f http://localhost:80
          echo "Frontend OK!"

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down